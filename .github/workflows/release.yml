name: "Publish Release"

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # STEP 1: Build the Linux static binary
  static-build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Maximize Build Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf /usr/lib/jvm
          docker system prune -af
          df -h

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: build laravel backend binary
        uses: docker/build-push-action@v6
        with:
          context: app2BackEnd
          file: app2BackEnd/static-build.Dockerfile
          tags: laravel-builder:latest
          load: true
          build-args: |
            MAKE_JOBS=2
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: extract and upload
        run: |
         docker create --name temp-builder laravel-builder:latest
         docker cp temp-builder:/go/src/app/dist/static-php-cli/buildroot/bin/frankenphp ./laravel-backend
         docker rm -f temp-builder

      - uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: laravel-backend

  # STEP 2: Package the App (Windows/Linux)
  publish-tauri:
    needs: static-build 
    permissions:
      contents: write
      actions: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            target: "x86_64-unknown-linux-gnu"
            suffix: ""
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            suffix: ".exe"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install system dependencies (ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: app2FrontEnd/src-tauri/internal

      - name: Prepare sidecar naming
        shell: bash
        run: |
          cd app2FrontEnd/src-tauri/internal
          mv laravel-backend laravel-backend-${{ matrix.target }}${{ matrix.suffix }}
          chmod +x laravel-backend-${{ matrix.target }}${{ matrix.suffix }} || true

      - name: install frontend dependencies
        run: |
          cd app2FrontEnd
          npm install

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "App Release - ${{ github.ref_name }}"
          releaseBody: "Includes production sidecar. Contact: mostaphaff123@gmail.com"
          releaseDraft: false
          prerelease: false
          projectPath: "app2FrontEnd"