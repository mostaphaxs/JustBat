
name: "Publish Release"

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  
  publish-tauri:
    permissions:
      contents: write
      actions: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            target: "x86_64-unknown-linux-gnu"
            suffix: ""
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            suffix: ".exe"
            
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install system dependencies (ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup php
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: phar, mbstring, openssl, curl, fileinfo

      - name: build backend phar
        run: |
          cd app2BackEnd
          composer install --no-dev --optimize-autoloader --ignore-platform-reqs
          php -d phar.readonly=0 build-phar.php

      - name: download micro sfx and concatenate
        shell: bash
        run: |
          mkdir -p app2FrontEnd/src-tauri/internal
          if [ "${{ matrix.platform }}" == "ubuntu-22.04" ]; then
            curl -L https://github.com/crazywhalecc/static-php-cli/releases/download/v2.1.0/micro_linux_x86_64.sfx -o micro.sfx
            cat micro.sfx app2BackEnd/app.phar > app2FrontEnd/src-tauri/internal/laravel-backend-x86_64-unknown-linux-gnu
            chmod +x app2FrontEnd/src-tauri/internal/laravel-backend-x86_64-unknown-linux-gnu
          else
            curl -L https://github.com/crazywhalecc/static-php-cli/releases/download/v2.1.0/micro_windows_x86_64.sfx -o micro_windows.sfx
            cat micro_windows.sfx app2BackEnd/app.phar > app2FrontEnd/src-tauri/internal/laravel-backend-x86_64-pc-windows-msvc.exe
          fi

      - name: install frontend dependencies
        run: |
          cd app2FrontEnd
          npm install

          
          
      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "App Release - ${{ github.ref_name }}"
          releaseBody: "Includes production sidecar. Contact: mostaphaff123@gmail.com"
          releaseDraft: false
          prerelease: false
          projectPath: "app2FrontEnd"